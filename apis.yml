name: Docubase
description: AI-powered document management and knowledge base platform that 
  helps teams organize, search, and collaborate on documents using natural 
  language processing.
image: https://www.docubase.io/images/logo.png
url: https://www.docubase.io
created: '2024'
modified: '2024'
apis:
  - name: Docubase Documents API
    description: >-
      API for uploading, managing, and retrieving documents within Docubase.
    image: https://www.docubase.io/images/documents-api.png
    baseURL: https://api.docubase.io/v1
    humanURL: https://www.docubase.io/apis/documents
    tags:
      - Documents
      - File Management
      - Upload
      - Storage
    properties:
      - type: Documentation
        url: https://docs.docubase.io/api/documents
      - type: OpenAPI
        url: https://api.docubase.io/v1/openapi.json
      - type: Authentication
        url: https://docs.docubase.io/authentication
    contact:
      - FN: Docubase API Support
        email: api-support@docubase.io
        url: https://www.docubase.io/support
  - name: Docubase Search API
    description: >-
      AI-powered semantic search API for finding relevant documents and content using
      natural language queries.
    image: https://www.docubase.io/images/search-api.png
    baseURL: https://api.docubase.io/v1
    humanURL: https://www.docubase.io/apis/search
    tags:
      - Search
      - AI
      - Natural Language Processing
      - Semantic Search
    properties:
      - type: Documentation
        url: https://docs.docubase.io/api/search
      - type: OpenAPI
        url: https://api.docubase.io/v1/openapi.json
      - type: Pricing
        url: https://www.docubase.io/pricing
  - name: Docubase Collections API
    description: >-
      API for organizing documents into collections and managing folder structures.
    image: https://www.docubase.io/images/collections-api.png
    baseURL: https://api.docubase.io/v1
    humanURL: https://www.docubase.io/apis/collections
    tags:
      - Collections
      - Organization
      - Folders
      - Categories
    properties:
      - type: Documentation
        url: https://docs.docubase.io/api/collections
      - type: OpenAPI
        url: https://api.docubase.io/v1/openapi.json
  - name: Docubase Analytics API
    description: >-
      API for retrieving usage analytics, search insights, and document engagement
      metrics.
    image: https://www.docubase.io/images/analytics-api.png
    baseURL: https://api.docubase.io/v1
    humanURL: https://www.docubase.io/apis/analytics
    tags:
      - Analytics
      - Metrics
      - Reporting
      - Insights
    properties:
      - type: Documentation
        url: https://docs.docubase.io/api/analytics
      - type: OpenAPI
        url: https://api.docubase.io/v1/openapi.json
